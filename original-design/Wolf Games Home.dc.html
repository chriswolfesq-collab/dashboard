<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Domine:wght@500;700&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    @keyframes felt-in { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    body { margin: 0; }
  </style>
</helmet>

<x-import component-from-global-scope="image-slot" from="./image-slot.js" style="display:none" hint-size="0,0"></x-import>

<div style="min-height:100vh; background: oklch(0.96 0.018 75); font-family:'Karla',sans-serif; color: oklch(0.28 0.03 50);">

  <!-- Header -->
  <header style="background: oklch(0.24 0.03 145); padding: 56px 40px 64px; text-align:center; position:relative; overflow:hidden;">
    <div style="position:absolute; inset:0; background-image: repeating-linear-gradient(45deg, oklch(0.27 0.03 145) 0px, oklch(0.27 0.03 145) 2px, transparent 2px, transparent 14px); opacity:0.5;"></div>
    <div style="position:relative;">
      <div style="font-family:'Domine',serif; font-weight:700; font-size:56px; letter-spacing:0.5px; color: oklch(0.94 0.03 85);">Wolf Games</div>
      <div style="margin-top:14px; font-size:19px; color: oklch(0.85 0.02 90); max-width:560px; margin-left:auto; margin-right:auto;">
        Homemade card &amp; party games, built for the table (or the group chat).
      </div>
    </div>
  </header>

  <!-- Game grid -->
  <main style="max-width:1180px; margin:0 auto; padding:56px 32px 80px;">
    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:32px;">
      <sc-for list="{{ games }}" as="game" hint-placeholder-count="6">
        <a href="{{ game.href }}" style="text-decoration:none; color:inherit; display:flex; flex-direction:column; background: oklch(0.985 0.008 85); border-radius:14px; overflow:hidden; box-shadow: 0 1px 0 oklch(0.8 0.02 85 / 0.6), 0 8px 20px oklch(0.3 0.03 50 / 0.08); border-top: 6px solid {{ game.accent }}; animation: felt-in 0.5s ease both;" style-hover="transform: translateY(-4px); box-shadow: 0 10px 28px oklch(0.3 0.03 50 / 0.16);">
          <div style="padding:22px 22px 0;">
            <image-slot id="{{ game.slotId }}" style="width:100%; aspect-ratio:16/10; border-radius:10px; display:block;" shape="rounded" radius="10" placeholder="{{ game.placeholder }}"></image-slot>
          </div>
          <div style="padding:20px 22px 26px; display:flex; flex-direction:column; gap:10px; flex:1;">
            <div style="font-family:'Domine',serif; font-weight:700; font-size:24px;">{{ game.name }}</div>
            <div style="font-size:15px; line-height:1.5; color: oklch(0.4 0.03 50); flex:1;">{{ game.blurb }}</div>
            <div style="margin-top:6px; display:inline-flex; align-items:center; gap:8px; font-weight:700; font-size:14px; color:{{ game.accent }};">
              Play now <span>&rarr;</span>
            </div>
          </div>
        </a>
      </sc-for>

      <!-- Coming soon tile -->
      <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; border:2px dashed oklch(0.7 0.03 70); border-radius:14px; padding:40px 22px; min-height:260px; color: oklch(0.5 0.03 60); text-align:center;">
        <div style="font-family:'Domine',serif; font-size:20px; font-weight:700;">More on the way</div>
        <div style="font-size:14px; max-width:220px;">New games get added here as they're built.</div>
      </div>
    </div>
  </main>

  <footer style="text-align:center; padding:32px; font-size:13px; color: oklch(0.5 0.03 60);">
    &copy; {{ year }} Wolf Games
  </footer>
</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    const games = [
      { name: 'Action Hold Em', blurr: '', blurb: "Texas Hold'em with a twist \u2014 dares and drama at every bet.", href: '#', accent: 'oklch(0.55 0.14 25)', slotId: 'logo-action-holdem', placeholder: 'Action Hold Em logo' },
      { name: 'Anagram', blurb: 'Race to unscramble letters before the timer runs out.', href: '#', accent: 'oklch(0.55 0.14 150)', slotId: 'logo-anagram', placeholder: 'Anagram logo' },
      { name: 'BS', blurb: 'Bluff your way through the deck \u2014 call it, or get caught.', href: '#', accent: 'oklch(0.55 0.14 85)', slotId: 'logo-bs', placeholder: 'BS logo' },
      { name: 'Spoons', blurb: 'Match four of a kind, then grab a spoon before it\u2019s gone.', href: '#', accent: 'oklch(0.55 0.14 260)', slotId: 'logo-spoons', placeholder: 'Spoons logo' },
      { name: 'Name Game', blurb: 'Guess the name on your forehead from your team\u2019s clues.', href: '#', accent: 'oklch(0.55 0.14 330)', slotId: 'logo-namegame', placeholder: 'Name Game logo' },
      { name: 'Acrophobia', blurb: 'Turn any acronym into the funniest phrase you can invent.', href: '#', accent: 'oklch(0.55 0.14 200)', slotId: 'logo-acrophobia', placeholder: 'Acrophobia logo' },
    ];
    return {
      games,
      year: new Date().getFullYear(),
    };
  }
}

</script>
</body>
</html>
